task:
  name: "Bin Packing Problem"
  description: |
    Solve the classic 1-D Bin Packing Problem (BPP), minimising the number of
    bins used to pack a given set of items.

    You are given a bin capacity and a set of item types. Each item type has a
    size and a quantity (how many items of that size must be packed). You must
    pack all items into the smallest possible number of bins.

    Your program `solution.py` must define:

        solve(bin_capacity, items, time_limit, seed) -> bins

      bin_capacity   int, the capacity of each bin
      items          list of (size, quantity) tuples — item types to pack
      time_limit     float, seconds you may spend on THIS instance
      seed           int, for reproducible randomisation
      bins           list[list[int]], each inner list is one bin's contents
                     (a list of item indices). Total count of each item index
                     across all bins must equal that item's quantity.

    A bin is feasible if and only if:
      1. Sum of sizes in each bin ≤ bin_capacity
      2. Total occurrences of each item index across all bins = its quantity
      3. All indices are non-negative integers < len(items)

    **Any infeasible or malformed solution fails the entire evaluation.**

    **Scoring.** Score = mean over the hidden instances of `lower_bound / num_bins_used`,
    where `lower_bound = ceil(total_item_size / bin_capacity)`. That bound is
    exact and provably unbeatable, so the score lies in (0, 1]. It is NOT always
    tight: at these sizes even an optimal solution scores below 1.0. Treat the
    score as a relative measure — higher is strictly better — not as "% of optimal".

    **Instances.** The hidden set contains up to 10 instances drawn from the public
    "Benchmark dataset for logistic-oriented Bin Packing Problems", covering 1D,
    2D (flattened to 1D), 3D (flattened to 1D), and real-world problem instances.
    All instances use only the first spatial dimension as the item size.

    **Instances for development.** `instances/` holds all the same instances with
    exact lower bounds in `instances/reference.json`. Run `python evaluate_local.py`
    to score yourself with the grader's formula.

    Consider:
    - Greedy construction heuristics: FFD, BFD, WFD (worst-fit decreasing)
    - Local search: swap items between bins to reduce waste, merge bins
    - Pattern-based approaches: generate feasible bin patterns and solve a
      set-covering MIP relaxation (Gilmore-Gomory column generation)
    - Metaheuristics: simulated annealing, tabu search, genetic algorithms
    - Subproblem: given a candidate set of patterns, the assignment problem of
      deciding how many times to use each pattern is an integer linear program
    - For instances with many small items, pattern-based methods excel;
      for instances with large items, local search can be very effective
  tips: |
    - Score = mean(lower_bound / num_bins_used) over the hidden instances.
    - Reference points on the hidden set:
        FFD (first-fit decreasing)  — your starting point
        BFD (best-fit decreasing)   — often slightly better than FFD
        lower bound                 — unattainable in general
      Beating the FFD baseline means finding better packings than greedy
      construction heuristics.
    - `time_limit` is 10 seconds PER INSTANCE. The seed solves the largest
      instance in well under a second, so most of that budget is unused.
    - `solve()` must be deterministic given `seed`. The grader fixes PYTHONHASHSEED
      and seeds `random` before each call.
    - Your program runs inside the grader's virtualenv. **numpy is available; no
      exact solver is (no ortools, pulp, cvxpy, mip).** Writing a heuristic is
      the task. Adding a pyproject.toml will not change the interpreter you get.
    - `python evaluate_local.py` scores you on the visible instances for free — use
      it liberally before spending an eval.

preset: local-claude

# 2 agents so that notes/skills act as a genuine cross-agent sharing channel —
# the mechanism Task 3 ablates and Task 4 improves. A fixed eval budget with NO
# score_threshold keeps every ablation condition directly comparable.
agents:
  count: 2
  model: opus

run:
  stop:
    max_real_attempts: 12

grader:
  entrypoint: "bpp_grader.grader:Grader"
  setup:
    - "uv pip install -e ./grader"
  timeout: 1200
  direction: maximize
  private:
    - "taskdata"   # hidden instances -> .coral/private/taskdata
  args:
    program_file: "solution.py"
    time_limit: 10.0
    base_seed: 12345

workspace:
  results_dir: "./results"
  repo_path: "./seed"
  setup:
    - "uv venv"
    - "uv pip install numpy"
