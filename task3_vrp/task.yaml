# ---------------------------------------------------------------------------
# CVRP task — HINT-FREE REWRITE.
#
# The previous version (task.leaky.old.yaml) handed the agents the answer. Its
# `Consider:` block named Clarke-Wright, sweep, 2-opt/3-opt/Or-opt, relocate/
# exchange/cross-exchange, SA/tabu/RRT, giant-tour + Split, GA/HGS — and spelled
# out "The Prins (2004) split algorithm turns any TSP tour into an optimal CVRP
# solution for that ordering in O(n) time". Every algorithm any agent used on
# attempt 1 of the first study was named in that block. The scoring section also
# named the reference solver (PyVRP hybrid genetic search), and `tips` named the
# available/unavailable libraries.
#
# That is why Task 3 found nothing: a knowledge-accumulation channel was measured
# on a task whose answer was in the briefing. See OBSERVATIONS.md § 3.
#
# This file states the PROBLEM, the INTERFACE, and the RULES — and nothing about
# how to solve it. Everything an agent needs to discover (which algorithms work,
# which libraries exist, what the reference is) is now genuinely discoverable
# knowledge, i.e. exactly the traffic the notes channel is supposed to carry.
#
# ---------------------------------------------------------------------------

task:
  name: "Capacitated Vehicle Routing Problem"
  description: |
    Solve the Capacitated Vehicle Routing Problem (CVRP), minimising the total
    distance travelled by a fleet of vehicles.

    You are given a set of customers, each with a location and a demand. A fleet
    of identical vehicles, each with the same capacity, serves all customers
    starting and ending at a single depot. Every customer must be visited exactly
    once; the total demand on any route must not exceed the vehicle capacity.

    Your program `solution.py` must define:

        solve(dimension, capacity, node_coords, demands, n_vehicles, time_limit, seed) -> routes

      dimension     int, total number of nodes (depot + customers)
      capacity      int, vehicle capacity
      node_coords   list[tuple[int,int]], coordinates of each node. Node 0 is
                    the depot; nodes 1..dimension-1 are customers.
      demands       list[int], demand at each node. demands[0] = 0.
      n_vehicles    int, number of vehicles available (always dimension - 1, i.e.
                    one per customer — effectively unlimited). You may use fewer
                    vehicles but not more.
      time_limit    float, seconds you may spend on THIS instance
      seed          int, for reproducible randomisation
      routes        list[list[int]], each inner list is one vehicle's route
                    (a sequence of customer indices starting and ending at the
                    depot, which is implied — do NOT include 0 in the route).

    **Distances.** The edge weight type is EUC_2D: Euclidean distance rounded to
    the nearest integer, with double-precision computations:

        dx = x[i] - x[j]; dy = y[i] - y[j]
        d = int(math.sqrt(dx*dx + dy*dy) + 0.5)

    **Feasibility.** A solution is infeasible if ANY of these holds:
      1. A customer is visited more than once or not at all
      2. A route's total demand exceeds `capacity`
      3. More than `n_vehicles` routes are used
      4. A route contains an invalid customer index (< 1 or >= dimension)
    **Any infeasible or malformed solution fails the entire evaluation.**

    **Scoring.** Score = mean over the hidden instances of
    `reference_distance / solver_distance`. The reference distance for each
    instance is a fixed constant computed in advance. It is NOT a proven optimum
    — it is close to one, but slightly loose.

    Higher is strictly better, and there is no fixed ceiling on the score: if
    your solver beats the reference on an instance, your score on that instance
    will slightly exceed 1.0.

    **Instances.** Every instance is a freshly generated CVRP with n = 100
    customers (dimension 101). None have ever been published, and no optimum
    is known for them, publicly or privately. There are 50 hidden instances
    used for grading and 10 public instances for development, and the two
    sets are disjoint — the dev set is not a subset of the graded set.

    **Instances for development.** `instances/` holds 10 CVRP instances with
    reference distances in `instances/reference.json`. Run `python
    evaluate_local.py` to score yourself with the exact grader formula.

  tips: |
    - Score = mean(reference_distance / solver_distance) over hidden instances;
      it can slightly exceed 1.0 if you beat the reference on an instance.
    - Distances are EUC_2D: compute `int(sqrt(dx²+dy²) + 0.5)`. Getting this
      wrong silently invalidates your gaps.
    - `n_vehicles` is always dimension - 1 (effectively unlimited); you may use
      fewer but not more.
    - `time_limit` is 10 seconds PER INSTANCE. At n=100 this is tight.
    - `solve()` must be deterministic given `seed`. The grader fixes PYTHONHASHSEED
      and seeds `random` before each call.
    - Your program runs inside a fixed virtualenv that you cannot add packages to.
      Adding a pyproject.toml will not change the interpreter you get. Check what
      is importable before you rely on it.
    - `python evaluate_local.py` scores you on the visible instances for free — use
      it liberally before spending an eval.

preset: local-claude

# 2 agents so that notes/skills act as a genuine cross-agent sharing channel —
# the mechanism Task 3 ablates and Task 4 improves. A fixed eval budget with NO
# score_threshold keeps every ablation condition directly comparable.
agents:
  count: 2
  model: opus

run:
  stop:
    max_real_attempts: 12

grader:
  entrypoint: "vrp_grader.grader:Grader"
  setup:
    - "uv pip install -e ./grader"
  timeout: 1200
  direction: maximize
  private:
    - "../taskdata"
  args:
    program_file: "solution.py"
    time_limit: 10.0
    base_seed: 12345

workspace:
  results_dir: "./results"
  repo_path: "./seed"
  setup:
    - "uv venv"
    - "uv pip install numpy"
